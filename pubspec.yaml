name: verveforge
description: "VerveForge — 运动社交 App：记录训练·发现伙伴·挑战自我"
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: ^3.6.2
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase 全家桶（Auth + Database + Realtime + Storage）
  supabase_flutter: any

  # 状态管理
  flutter_riverpod: any
  riverpod_annotation: any

  # 路由
  go_router: any

  # UI 组件
  flutter_svg: any
  cached_network_image: any
  shimmer: any
  table_calendar: any
  fl_chart: any
  flutter_staggered_grid_view: any

  # 地图（高德）— 暂时注释以支持模拟器预览（SDK 无 simulator arm64）
  # amap_flutter_map: ^3.0.0
  # amap_flutter_location: ^3.0.0
  # amap_flutter_base: ^3.0.0

  # 健康数据
  health: ^13.1.4                    # W3 启用

  # Apple 登录
  sign_in_with_apple: ^6.1.0

  # 图片处理
  image_picker: ^1.0.7
  image_cropper: ^11.0.0

  # 推送通知（W6 启用）
  # firebase_core: ^3.6.0
  # firebase_messaging: ^15.1.0
  # flutter_local_notifications: ^18.0.0

  # 数据模型
  freezed_annotation: any
  json_annotation: any

  # 图片缓存管理（性能优化）
  flutter_cache_manager: any

  # 工具库
  uuid: any
  intl: any
  timeago: any
  url_launcher: any
  share_plus: any
  permission_handler: any
  connectivity_plus: any
  flutter_secure_storage: any
  path_provider: any
  shared_preferences: any
  logger: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  build_runner: any
  freezed: any
  json_serializable: any
  riverpod_generator: any
  mockito: any
  mocktail: any
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
